name: Build Buildroot Zynq RK7020F

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git make gcc \
            bison flex bc \
            libssl-dev libncurses5-dev \
            python3 rsync wget cpio unzip file

      - name: Set BR2_EXTERNAL path
        run: |
          echo "BR2_EXTERNAL_FKA_PATH=$GITHUB_WORKSPACE/buildroot_external" >> $GITHUB_ENV

      - name: Configure Buildroot
        working-directory: buildroot
        run: |
          make BR2_EXTERNAL=$BR2_EXTERNAL_FKA_PATH zynq_rk7020f_defconfig

      - name: Build
        working-directory: buildroot
        run: |
          make -j$(nproc)

      - name: Show artifacts
        working-directory: buildroot
        run: |
          ls -lah output/images || true

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: zynq-rk7020f-images
          path: buildroot/output/images
