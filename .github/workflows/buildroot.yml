name: Build Buildroot Zynq RK7020F
on:
  push:
    branches: ["main", "zynqmp_zcu106_rev1_0"]
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Общий кэш dl/ и ccache вне workspace — живёт между запусками на self-hosted
  DL_DIR: /opt/buildroot-cache/dl
  CCACHE_DIR: /opt/buildroot-cache/ccache

jobs:
  build-rk7020f:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    env:
      OUTPUT_DIR: output_rk7020f
      DEFCONFIG: zynq_rk7020f_defconfig
      ARTIFACT_NAME: zynq-rk7020f-images
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare cache directories
        run: |
          mkdir -p $DL_DIR $CCACHE_DIR

      - name: Set environment paths
        run: |
          echo "WORKSPACE_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "BUILDROOT_DIR=$GITHUB_WORKSPACE/buildroot" >> $GITHUB_ENV
          echo "BR2_EXTERNAL=$GITHUB_WORKSPACE/buildroot_external" >> $GITHUB_ENV

      - name: Sanity check
        run: |
          echo "=== WORKSPACE ==="
          ls -lah $WORKSPACE_ROOT
          echo "=== BUILDROOT ==="
          ls -lah $BUILDROOT_DIR
          echo "=== EXTERNAL ==="
          ls -lah $BR2_EXTERNAL
          echo "=== DL CACHE ==="
          du -sh $DL_DIR || true
          echo "=== CCACHE STATS ==="
          ccache --show-stats || true

      - name: Configure Buildroot
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make \
            O=${{ env.OUTPUT_DIR }} \
            BR2_EXTERNAL=$BR2_EXTERNAL \
            ${{ env.DEFCONFIG }}

      - name: Apply cache config overrides
        working-directory: ${{ env.BUILDROOT_DIR }}/${{ env.OUTPUT_DIR }}
        run: |
          # Указываем общий dl/ и включаем ccache
          cat >> .config <<EOF
          BR2_DL_DIR="$DL_DIR"
          BR2_CCACHE=y
          BR2_CCACHE_DIR="$CCACHE_DIR"
          EOF
          # Пересчитываем зависимости после ручной правки .config
          make -C ${{ env.BUILDROOT_DIR }} O=${{ env.OUTPUT_DIR }} olddefconfig

      - name: Build
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make O=${{ env.OUTPUT_DIR }} -j$(nproc)

      - name: Build SDK
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make O=${{ env.OUTPUT_DIR }} sdk

      - name: Show artifacts
        run: |
          ls -lah ${{ env.BUILDROOT_DIR }}/${{ env.OUTPUT_DIR }}/images || true

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            buildroot/${{ env.OUTPUT_DIR }}/images/sdcard.img
            buildroot/${{ env.OUTPUT_DIR }}/images/*_sdk-*.tar.gz

  build-zcu106:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    env:
      OUTPUT_DIR: output_zcu106
      DEFCONFIG: zynqmp_zcu106_defconfig
      ARTIFACT_NAME: zynqmp-zcu106-images
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare cache directories
        run: |
          mkdir -p $DL_DIR $CCACHE_DIR

      - name: Set environment paths
        run: |
          echo "WORKSPACE_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "BUILDROOT_DIR=$GITHUB_WORKSPACE/buildroot" >> $GITHUB_ENV
          echo "BR2_EXTERNAL=$GITHUB_WORKSPACE/buildroot_external" >> $GITHUB_ENV

      - name: Sanity check
        run: |
          echo "=== WORKSPACE ==="
          ls -lah $WORKSPACE_ROOT
          echo "=== BUILDROOT ==="
          ls -lah $BUILDROOT_DIR
          echo "=== EXTERNAL ==="
          ls -lah $BR2_EXTERNAL
          echo "=== DL CACHE ==="
          du -sh $DL_DIR || true
          echo "=== CCACHE STATS ==="
          ccache --show-stats || true

      - name: Configure Buildroot
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make \
            O=${{ env.OUTPUT_DIR }} \
            BR2_EXTERNAL=$BR2_EXTERNAL \
            ${{ env.DEFCONFIG }}

      - name: Apply cache config overrides
        working-directory: ${{ env.BUILDROOT_DIR }}/${{ env.OUTPUT_DIR }}
        run: |
          cat >> .config <<EOF
          BR2_DL_DIR="$DL_DIR"
          BR2_CCACHE=y
          BR2_CCACHE_DIR="$CCACHE_DIR"
          EOF
          make -C ${{ env.BUILDROOT_DIR }} O=${{ env.OUTPUT_DIR }} olddefconfig

      - name: Build
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make O=${{ env.OUTPUT_DIR }} -j$(nproc)

      - name: Build SDK
        working-directory: ${{ env.BUILDROOT_DIR }}
        run: |
          make O=${{ env.OUTPUT_DIR }} sdk

      - name: Show artifacts
        run: |
          ls -lah ${{ env.BUILDROOT_DIR }}/${{ env.OUTPUT_DIR }}/images || true

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            buildroot/${{ env.OUTPUT_DIR }}/images/sdcard.img
            buildroot/${{ env.OUTPUT_DIR }}/images/*_sdk-*.tar.gz

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-rk7020f, build-zcu106]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download rk7020f artifacts
        uses: actions/download-artifact@v4
        with:
          name: zynq-rk7020f-images
          path: artifacts/rk7020f

      - name: Download zcu106 artifacts
        uses: actions/download-artifact@v4
        with:
          name: zynqmp-zcu106-images
          path: artifacts/zcu106

      - name: Show downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: artifacts/**/*